<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f0f4f8; color: #1e293b; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #1B3D6D; border-bottom: 1px solid #152e54; color: #fff; }
    header h1 { font-size: 18px; font-weight: 600; }
    .toolbar { display: flex; gap: 8px; }
    .toolbar button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.15s; }
    .save-group { position: relative; display: flex; }
    #save-btn { background: #D4A843; color: #1B3D6D; border-radius: 6px 0 0 6px !important; font-weight: 600; }
    #save-btn:hover { background: #c9993a; }
    #save-dropdown-btn { background: #D4A843; color: #1B3D6D; border-radius: 0 6px 6px 0 !important; padding: 8px 6px !important; border-left: 1px solid rgba(0,0,0,0.15) !important; }
    #save-dropdown-btn:hover { background: #c9993a; }
    .save-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 4px; background: #fff; border: 1px solid #d4d4d4; border-radius: 8px; overflow: hidden; z-index: 100; min-width: 140px; box-shadow: 0 8px 24px rgba(27,61,109,0.2); }
    .save-menu.open { display: block; }
    .save-menu button { display: block; width: 100%; padding: 8px 14px; border: none; background: none; color: #1e293b; font-size: 13px; text-align: left; cursor: pointer; }
    .save-menu button:hover { background: #f0ead6; }
    #theme-btn { background: rgba(255,255,255,0.2); color: #fff; }
    #theme-btn:hover { background: rgba(255,255,255,0.3); }
    .settings-panel { display: none; position: absolute; top: 48px; right: 12px; background: #fff; border: 1px solid #d4d4d4; border-radius: 10px; padding: 16px; z-index: 100; width: 280px; box-shadow: 0 8px 32px rgba(27,61,109,0.2); }
    .settings-panel.open { display: block; }
    .settings-panel h3 { font-size: 13px; font-weight: 600; color: #1B3D6D; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .settings-panel h3:not(:first-child) { margin-top: 14px; border-top: 1px solid #e8e8e8; padding-top: 12px; }
    .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .color-row label { font-size: 13px; color: #334155; }
    .color-row input[type="color"] { width: 36px; height: 28px; border: 1px solid #d4d4d4; border-radius: 4px; background: none; cursor: pointer; padding: 0; }
    .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
    .preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .preset-btn { width: 28px; height: 28px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
    .preset-btn:hover, .preset-btn.active { border-color: #D4A843; }
    .size-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .size-row label { font-size: 13px; color: #334155; flex-shrink: 0; }
    .size-row input[type="range"] { flex: 1; accent-color: #1B3D6D; }
    .size-row span { font-size: 12px; color: #64748b; min-width: 32px; text-align: right; }
    /* Examples dropdown */
    .examples-group { position: relative; }
    .examples-menu { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border: 1px solid #d4d4d4; border-radius: 8px; overflow: hidden; z-index: 100; min-width: 180px; box-shadow: 0 8px 24px rgba(27,61,109,0.2); max-height: 300px; overflow-y: auto; }
    .examples-menu.open { display: block; }
    .examples-menu button { display: block; width: 100%; padding: 8px 14px; border: none; background: none; color: #1e293b; font-size: 13px; text-align: left; cursor: pointer; }
    .examples-menu button:hover { background: #f0ead6; }
    #examples-btn { background: rgba(255,255,255,0.2); color: #fff; }
    #examples-btn:hover { background: rgba(255,255,255,0.3); }
    /* Fullscreen */
    .container.fullscreen .editor-pane, .container.fullscreen .resize-handle { display: none; }
    #fullscreen-btn { background: rgba(255,255,255,0.2); color: #fff; }
    #fullscreen-btn:hover { background: rgba(255,255,255,0.3); }
    /* Drop overlay */
    .drop-overlay { display: none; position: absolute; inset: 0; background: rgba(212,168,67,0.1); border: 3px dashed #D4A843; z-index: 200; align-items: center; justify-content: center; font-size: 18px; color: #1B3D6D; pointer-events: none; }
    .drop-overlay.visible { display: flex; }
    /* Shortcuts hint */
    .shortcuts-hint { position: absolute; bottom: 12px; left: 12px; font-size: 11px; color: #585b70; z-index: 10; }
    .container { display: flex; flex: 1; overflow: hidden; position: relative; }
    .editor-pane { width: 40%; display: flex; flex-direction: column; border-right: 1px solid #d4d4d4; }
    .editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
    .line-numbers { padding: 16px 12px; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 14px; line-height: 1.6; background: #f0ead6; color: #1B3D6D; text-align: right; user-select: none; overflow: hidden; min-width: 48px; border-right: 1px solid #d4d4d4; }
    .line-numbers span { display: block; }
    .editor-pane textarea { flex: 1; resize: none; border: none; outline: none; padding: 16px; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 14px; line-height: 1.6; background: #f8fafc; color: #1e293b; tab-size: 2; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
    .preview-pane { flex: 1; overflow: hidden; position: relative; background: #ffffff; cursor: grab; }
    .preview-pane.grabbing { cursor: grabbing; }
    .preview-pane.dark { background: #1e1e2e; }
    .preview-pane.dark svg text { fill: #cdd6f4 !important; }
    #preview { transform-origin: 0 0; position: absolute; top: 0; left: 0; }
    .zoom-controls { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 4px; align-items: center; z-index: 10; }
    .zoom-controls button { width: 32px; height: 32px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fff; color: #333; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .zoom-controls button:hover { background: #eee; }
    .preview-pane.dark .zoom-controls button { background: #313244; color: #cdd6f4; border-color: #45475a; }
    .preview-pane.dark .zoom-controls button:hover { background: #45475a; }
    .zoom-label { font-size: 12px; color: #666; min-width: 42px; text-align: center; font-family: system-ui, sans-serif; }
    .preview-pane.dark .zoom-label { color: #a6adc8; }
    #error { color: #dc2626; padding: 12px 16px; font-size: 13px; font-family: monospace; background: #fef2f2; border-top: 1px solid #fecaca; display: none; max-height: 80px; overflow: auto; }
    .resize-handle { width: 4px; cursor: col-resize; background: #d4d4d4; transition: background 0.15s; }
    .resize-handle:hover, .resize-handle.active { background: #D4A843; }
  </style>
</head>
<body>
  <header>
    <h1>Mermaid Viewer</h1>
    <div class="toolbar">
      <div class="examples-group">
        <button id="examples-btn" title="Insert example diagram">Examples</button>
        <div class="examples-menu" id="examples-menu">
          <button data-type="flowchart">Flowchart</button>
          <button data-type="sequence">Sequence Diagram</button>
          <button data-type="class">Class Diagram</button>
          <button data-type="er">ER Diagram</button>
          <button data-type="gantt">Gantt Chart</button>
          <button data-type="pie">Pie Chart</button>
          <button data-type="state">State Diagram</button>
          <button data-type="journey">User Journey</button>
          <button data-type="mindmap">Mindmap</button>
          <button data-type="gitgraph">Git Graph</button>
          <button data-type="c4context">C4 Context</button>
          <button data-type="timeline">Timeline</button>
          <button data-type="sankey">Sankey</button>
          <button data-type="xy">XY Chart</button>
          <button data-type="block">Block Diagram</button>
          <button data-type="quadrant">Quadrant Chart</button>
          <button data-type="requirement">Requirement</button>
          <button data-type="kanban">Kanban Board</button>
          <button data-type="packet">Packet Diagram</button>
          <button data-type="architecture">Architecture</button>
        </div>
      </div>
      <button id="fullscreen-btn" title="Toggle fullscreen preview (F11)">Fullscreen</button>
      <button id="theme-btn" title="Colors & Background">Colors</button>
      <div class="save-group">
        <button id="save-btn" title="Export as PNG">Save PNG</button>
        <button id="save-dropdown-btn" title="More formats">&#9662;</button>
        <div class="save-menu" id="save-menu">
          <button data-format="png">Save as PNG</button>
          <button data-format="jpg">Save as JPG</button>
          <button data-format="svg">Save as SVG</button>
          <button data-format="pdf">Save as PDF</button>
          <button data-format="clipboard">Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </header>
  <div class="settings-panel" id="settings-panel">
    <h3>Background</h3>
    <div class="preset-row" id="bg-presets">
      <button class="preset-btn active" data-bg="#ffffff" style="background:#ffffff" title="White"></button>
      <button class="preset-btn" data-bg="#f5f5f5" style="background:#f5f5f5" title="Light gray"></button>
      <button class="preset-btn" data-bg="#1e1e2e" style="background:#1e1e2e" title="Dark"></button>
      <button class="preset-btn" data-bg="#0d1117" style="background:#0d1117" title="GitHub Dark"></button>
      <button class="preset-btn" data-bg="#fdf6e3" style="background:#fdf6e3" title="Solarized Light"></button>
      <button class="preset-btn" data-bg="#002b36" style="background:#002b36" title="Solarized Dark"></button>
      <button class="preset-btn" data-bg="transparent" style="background:repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0 / 14px 14px" title="Transparent"></button>
    </div>
    <div class="color-row">
      <label>Custom</label>
      <input type="color" id="bg-color" value="#ffffff">
    </div>
    <h3>Diagram Colors</h3>
    <div class="color-row">
      <label>Primary (nodes)</label>
      <input type="color" id="clr-primary" value="#4C78DB">
    </div>
    <div class="color-row">
      <label>Secondary</label>
      <input type="color" id="clr-secondary" value="#E8D44D">
    </div>
    <div class="color-row">
      <label>Tertiary</label>
      <input type="color" id="clr-tertiary" value="#BB6BD9">
    </div>
    <div class="color-row">
      <label>Background</label>
      <input type="color" id="clr-background" value="#ffffff">
    </div>
    <div class="color-row">
      <label>Text</label>
      <input type="color" id="clr-text" value="#333333">
    </div>
    <div class="color-row">
      <label>Lines</label>
      <input type="color" id="clr-line" value="#333333">
    </div>
    <h3>Text Size</h3>
    <div class="size-row">
      <label>Editor</label>
      <input type="range" id="editor-font-size" min="10" max="24" value="14">
      <span id="editor-font-label">14px</span>
    </div>
    <div class="size-row">
      <label>Diagram</label>
      <input type="range" id="diagram-font-size" min="10" max="24" value="16">
      <span id="diagram-font-label">16px</span>
    </div>
    <h3>Mermaid Theme</h3>
    <div class="preset-row" id="theme-presets">
      <button class="preset-btn active" data-theme="default" style="background:linear-gradient(135deg,#4C78DB,#E8D44D)" title="Default"></button>
      <button class="preset-btn" data-theme="dark" style="background:linear-gradient(135deg,#1f2020,#ccc)" title="Dark"></button>
      <button class="preset-btn" data-theme="forest" style="background:linear-gradient(135deg,#2a6e3f,#8bc34a)" title="Forest"></button>
      <button class="preset-btn" data-theme="neutral" style="background:linear-gradient(135deg,#999,#ddd)" title="Neutral"></button>
      <button class="preset-btn" data-theme="base" style="background:linear-gradient(135deg,#f4f4f4,#cde)" title="Base (custom)"></button>
    </div>
  </div>
  <div class="container" id="main-container">
    <div class="drop-overlay" id="drop-overlay">Drop .mmd file to load</div>
    <div class="editor-pane">
      <div class="editor-wrap">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="code" spellcheck="false">graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Do something]
    B -->|No| D[Do something else]
    C --> E[End]
    D --> E</textarea>
      </div>
      <div id="error"></div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="preview-pane" id="preview-pane">
      <div id="preview"></div>
      <div class="zoom-controls">
        <button id="zoom-out" title="Zoom out">−</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-fit" title="Fit to view">⊡</button>
        <button id="zoom-reset" title="Reset zoom">1:1</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

    const code = document.getElementById('code');
    const preview = document.getElementById('preview');
    const errorEl = document.getElementById('error');
    const lineNumbers = document.getElementById('line-numbers');

    function updateLineNumbers() {
      const lines = code.value.split('\n').length;
      const current = lineNumbers.children.length;
      if (lines === current) return;
      const frag = document.createDocumentFragment();
      for (let i = 1; i <= lines; i++) {
        const span = document.createElement('span');
        span.textContent = i;
        frag.appendChild(span);
      }
      lineNumbers.innerHTML = '';
      lineNumbers.appendChild(frag);
    }

    code.addEventListener('scroll', () => {
      lineNumbers.scrollTop = code.scrollTop;
    });
    const saveBtn = document.getElementById('save-btn');
    const themeBtn = document.getElementById('theme-btn');
    const previewPane = document.getElementById('preview-pane');
    const resizeHandle = document.getElementById('resize-handle');
    const editorPane = document.querySelector('.editor-pane');

    let renderCounter = 0;
    let debounceTimer;

    async function renderDiagram() {
      const src = code.value.trim();
      if (!src) {
        preview.innerHTML = '';
        errorEl.style.display = 'none';
        return;
      }
      try {
        const id = `mermaid-${++renderCounter}`;
        const { svg } = await mermaid.render(id, src);
        preview.innerHTML = svg;
        errorEl.style.display = 'none';
        requestAnimationFrame(fitToView);
      } catch (err) {
        errorEl.textContent = err.message || 'Invalid syntax';
        errorEl.style.display = 'block';
        // Clean up any leftover error containers mermaid may have added
        const errContainer = document.getElementById(`dmermaid-${renderCounter}`);
        if (errContainer) errContainer.remove();
      }
    }

    code.addEventListener('input', () => {
      updateLineNumbers();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderDiagram, 300);
    });

    // Tab key inserts spaces instead of changing focus
    code.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = code.selectionStart;
        const end = code.selectionEnd;
        code.value = code.value.substring(0, start) + '  ' + code.value.substring(end);
        code.selectionStart = code.selectionEnd = start + 2;
        code.dispatchEvent(new Event('input'));
      }
    });

    // Export functions
    function getSvgInfo() {
      const svgEl = preview.querySelector('svg');
      if (!svgEl) return null;
      // Clone and fix dimensions for export
      const clone = svgEl.cloneNode(true);
      const vb = clone.getAttribute('viewBox');
      if (vb) {
        const [,, w, h] = vb.split(/\s+/).map(Number);
        clone.setAttribute('width', w);
        clone.setAttribute('height', h);
        clone.removeAttribute('style');
      }
      const svgData = new XMLSerializer().serializeToString(clone);
      return { svgData, svgEl };
    }

    function exportToCanvas(callback) {
      const info = getSvgInfo();
      if (!info) return;
      const svgEl = info.svgEl;
      const vb = svgEl.getAttribute('viewBox');
      let w = 800, h = 600;
      if (vb) {
        const parts = vb.split(/\s+/).map(Number);
        w = Math.ceil(parts[2]); h = Math.ceil(parts[3]);
      }
      const s = 2;
      const canvas = document.createElement('canvas');
      canvas.width = w * s;
      canvas.height = h * s;
      const ctx = canvas.getContext('2d');
      const bg = previewPane.dataset.bg || '#ffffff';
      if (bg !== 'transparent') {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      // Clone SVG and replace foreignObject with text to avoid canvas tainting
      const clone = svgEl.cloneNode(true);
      if (vb) {
        const [,, vw, vh] = vb.split(/\s+/).map(Number);
        clone.setAttribute('width', vw);
        clone.setAttribute('height', vh);
        clone.removeAttribute('style');
      }
      clone.querySelectorAll('foreignObject').forEach(fo => {
        const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        const x = parseFloat(fo.getAttribute('x') || 0) + parseFloat(fo.getAttribute('width') || 0) / 2;
        const y = parseFloat(fo.getAttribute('y') || 0) + parseFloat(fo.getAttribute('height') || 0) / 2;
        textEl.setAttribute('x', x);
        textEl.setAttribute('y', y);
        textEl.setAttribute('text-anchor', 'middle');
        textEl.setAttribute('dominant-baseline', 'central');
        textEl.setAttribute('font-size', '14');
        textEl.setAttribute('font-family', 'system-ui, sans-serif');
        // Get text color from the foreignObject content
        const span = fo.querySelector('span, div, p');
        if (span) {
          const style = span.getAttribute('style') || '';
          const colorMatch = style.match(/color\s*:\s*([^;]+)/);
          if (colorMatch) textEl.setAttribute('fill', colorMatch[1].trim());
        }
        textEl.textContent = fo.textContent.trim();
        fo.parentNode.replaceChild(textEl, fo);
      });
      const svgStr = new XMLSerializer().serializeToString(clone);
      const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        ctx.scale(s, s);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        callback(canvas);
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        alert('Export failed. Please use "Save as SVG" instead.');
      };
      img.src = url;
    }

    function download(blob, name) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function exportAs(format) {
      if (format === 'svg') {
        const info = getSvgInfo();
        if (!info) return;
        download(new Blob([info.svgData], { type: 'image/svg+xml' }), 'mermaid-diagram.svg');
      } else if (format === 'png') {
        exportToCanvas(canvas => canvas.toBlob(b => download(b, 'mermaid-diagram.png'), 'image/png'));
      } else if (format === 'clipboard') {
        exportToCanvas(canvas => canvas.toBlob(async (b) => {
          try {
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': b })]);
            const origText = saveBtn.textContent;
            saveBtn.textContent = 'Copied!';
            setTimeout(() => saveBtn.textContent = origText, 1500);
          } catch(e) { alert('Copy failed: ' + e.message); }
        }, 'image/png'));
      } else if (format === 'jpg') {
        exportToCanvas(canvas => canvas.toBlob(b => download(b, 'mermaid-diagram.jpg'), 'image/jpeg', 0.95));
      } else if (format === 'pdf') {
        exportToCanvas(canvas => {
          const imgData = canvas.toDataURL('image/png');
          const w = canvas.width;
          const h = canvas.height;
          const isLandscape = w > h;
          const pageW = isLandscape ? 297 : 210;
          const pageH = isLandscape ? 210 : 297;
          const margin = 10;
          const maxW = pageW - margin * 2;
          const maxH = pageH - margin * 2;
          const ratio = Math.min(maxW / (w / 2), maxH / (h / 2));
          const imgW = (w / 2) * ratio;
          const imgH = (h / 2) * ratio;
          const x = (pageW - imgW) / 2;
          const y = (pageH - imgH) / 2;
          // Minimal PDF generation
          const objects = [];
          let offset = 0;
          function addObj(content) {
            const num = objects.length + 1;
            objects.push({ offset: 0, content: `${num} 0 obj\n${content}\nendobj\n` });
            return num;
          }
          addObj('<< /Type /Catalog /Pages 2 0 R >>');
          addObj(`<< /Type /Pages /Kids [3 0 R] /Count 1 >>`);
          addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${(pageW * 2.835).toFixed(2)} ${(pageH * 2.835).toFixed(2)}] /Contents 4 0 R /Resources << /XObject << /Img 5 0 R >> >> >>`);
          const stream = `q ${(imgW * 2.835).toFixed(2)} 0 0 ${(imgH * 2.835).toFixed(2)} ${(x * 2.835).toFixed(2)} ${((pageH - y - imgH) * 2.835).toFixed(2)} cm /Img Do Q`;
          addObj(`<< /Length ${stream.length} >>\nstream\n${stream}\nendstream`);
          // Decode base64 image
          const b64 = imgData.split(',')[1];
          const bin = atob(b64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          addObj(`<< /Type /XObject /Subtype /Image /Width ${w} /Height ${h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${bytes.length} >>`);
          // Build PDF with binary image — use JPG for DCTDecode
          const jpgData = canvas.toDataURL('image/jpeg', 0.95);
          const jpgB64 = jpgData.split(',')[1];
          const jpgBin = atob(jpgB64);
          const jpgBytes = new Uint8Array(jpgBin.length);
          for (let i = 0; i < jpgBin.length; i++) jpgBytes[i] = jpgBin.charCodeAt(i);
          objects[4].content = `5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${w} /Height ${h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpgBytes.length} >>\nstream\n`;
          // Build final PDF
          const header = '%PDF-1.4\n';
          const parts = [header];
          const offsets = [];
          let pos = header.length;
          for (let i = 0; i < objects.length; i++) {
            offsets.push(pos);
            if (i === 4) {
              const pre = objects[i].content;
              const post = '\nendstream\nendobj\n';
              parts.push(pre);
              pos += pre.length;
              parts.push(jpgBytes);
              pos += jpgBytes.length;
              parts.push(post);
              pos += post.length;
            } else {
              parts.push(objects[i].content);
              pos += objects[i].content.length;
            }
          }
          const xrefPos = pos;
          let xref = `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
          for (const o of offsets) xref += `${String(o).padStart(10, '0')} 00000 n \n`;
          xref += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF`;
          parts.push(xref);
          const blob = new Blob(parts, { type: 'application/pdf' });
          download(blob, 'mermaid-diagram.pdf');
        });
      }
    }

    // Save button (default PNG)
    saveBtn.addEventListener('click', () => exportAs('png'));

    // Dropdown menu
    const saveMenu = document.getElementById('save-menu');
    document.getElementById('save-dropdown-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      saveMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => saveMenu.classList.remove('open'));
    saveMenu.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        exportAs(btn.dataset.format);
        saveMenu.classList.remove('open');
      });
    });

    // Settings panel toggle
    const settingsPanel = document.getElementById('settings-panel');
    themeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPanel.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!settingsPanel.contains(e.target) && e.target !== themeBtn) {
        settingsPanel.classList.remove('open');
      }
    });

    // Background presets
    const bgPresets = document.querySelectorAll('#bg-presets .preset-btn');
    const bgColorInput = document.getElementById('bg-color');
    function setBgColor(color) {
      if (color === 'transparent') {
        previewPane.style.background = 'repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 0 0 / 20px 20px';
        previewPane.dataset.bg = 'transparent';
      } else {
        previewPane.style.background = color;
        previewPane.dataset.bg = color;
        bgColorInput.value = color;
      }
      bgPresets.forEach(b => b.classList.toggle('active', b.dataset.bg === color));
    }
    bgPresets.forEach(btn => btn.addEventListener('click', () => setBgColor(btn.dataset.bg)));
    bgColorInput.addEventListener('input', () => {
      bgPresets.forEach(b => b.classList.remove('active'));
      previewPane.style.background = bgColorInput.value;
    });

    // Diagram color inputs
    const clrPrimary = document.getElementById('clr-primary');
    const clrSecondary = document.getElementById('clr-secondary');
    const clrTertiary = document.getElementById('clr-tertiary');
    const clrBackground = document.getElementById('clr-background');
    const clrText = document.getElementById('clr-text');
    const clrLine = document.getElementById('clr-line');
    let currentMermaidTheme = 'default';

    function reInitMermaid() {
      const fontSize = diagramFontSize.value + 'px';
      const themeVars = currentMermaidTheme === 'base' ? {
        primaryColor: clrPrimary.value,
        secondaryColor: clrSecondary.value,
        tertiaryColor: clrTertiary.value,
        mainBkg: clrBackground.value,
        primaryTextColor: clrText.value,
        lineColor: clrLine.value,
        primaryBorderColor: clrLine.value,
        fontSize: fontSize,
      } : { fontSize: fontSize };
      mermaid.initialize({
        startOnLoad: false,
        theme: currentMermaidTheme === 'base' ? 'base' : currentMermaidTheme,
        themeVariables: themeVars,
        securityLevel: 'loose',
      });
      renderDiagram();
    }

    [clrPrimary, clrSecondary, clrTertiary, clrBackground, clrText, clrLine].forEach(input => {
      input.addEventListener('input', () => {
        currentMermaidTheme = 'base';
        document.querySelectorAll('#theme-presets .preset-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.theme === 'base')
        );
        reInitMermaid();
      });
    });

    // Text size controls
    const editorFontSize = document.getElementById('editor-font-size');
    const editorFontLabel = document.getElementById('editor-font-label');
    const diagramFontSize = document.getElementById('diagram-font-size');
    const diagramFontLabel = document.getElementById('diagram-font-label');

    editorFontSize.addEventListener('input', () => {
      const size = editorFontSize.value + 'px';
      editorFontLabel.textContent = size;
      code.style.fontSize = size;
      document.querySelector('.line-numbers').style.fontSize = size;
    });
    diagramFontSize.addEventListener('input', () => {
      const size = diagramFontSize.value;
      diagramFontLabel.textContent = size + 'px';
      reInitMermaid();
    });

    // Theme presets
    document.querySelectorAll('#theme-presets .preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentMermaidTheme = btn.dataset.theme;
        document.querySelectorAll('#theme-presets .preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        reInitMermaid();
      });
    });

    // Pan and Zoom
    let scale = 1;
    let panX = 0, panY = 0;
    let isPanning = false;
    let panStartX, panStartY;
    const zoomLabel = document.getElementById('zoom-label');

    function applyTransform() {
      preview.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      zoomLabel.textContent = Math.round(scale * 100) + '%';
    }

    function fitToView() {
      const svg = preview.querySelector('svg');
      if (!svg) return;
      const paneW = previewPane.clientWidth;
      const paneH = previewPane.clientHeight;
      const svgW = svg.getBoundingClientRect().width / scale;
      const svgH = svg.getBoundingClientRect().height / scale;
      if (!svgW || !svgH) return;
      const fitScale = Math.min(paneW / svgW, paneH / svgH) * 0.9;
      scale = Math.max(0.1, Math.min(fitScale, 5));
      panX = (paneW - svgW * scale) / 2;
      panY = (paneH - svgH * scale) / 2;
      applyTransform();
    }

    function resetZoom() {
      scale = 1;
      panX = 0;
      panY = 0;
      applyTransform();
    }

    // Wheel zoom (zoom toward cursor)
    previewPane.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = previewPane.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.max(0.1, Math.min(scale * delta, 10));
      const ratio = newScale / scale;
      panX = mx - ratio * (mx - panX);
      panY = my - ratio * (my - panY);
      scale = newScale;
      applyTransform();
    }, { passive: false });

    // Mouse drag to pan
    previewPane.addEventListener('mousedown', (e) => {
      if (e.target.closest('.zoom-controls')) return;
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      previewPane.classList.add('grabbing');
    });
    document.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      panX = e.clientX - panStartX;
      panY = e.clientY - panStartY;
      applyTransform();
    });
    document.addEventListener('mouseup', () => {
      if (isPanning) {
        isPanning = false;
        previewPane.classList.remove('grabbing');
      }
    });

    // Zoom buttons
    document.getElementById('zoom-in').addEventListener('click', () => {
      const rect = previewPane.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height / 2;
      const newScale = Math.min(scale * 1.25, 10);
      const ratio = newScale / scale;
      panX = cx - ratio * (cx - panX);
      panY = cy - ratio * (cy - panY);
      scale = newScale;
      applyTransform();
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      const rect = previewPane.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height / 2;
      const newScale = Math.max(scale * 0.8, 0.1);
      const ratio = newScale / scale;
      panX = cx - ratio * (cx - panX);
      panY = cy - ratio * (cy - panY);
      scale = newScale;
      applyTransform();
    });
    document.getElementById('zoom-fit').addEventListener('click', fitToView);
    document.getElementById('zoom-reset').addEventListener('click', resetZoom);

    // Resizable panes
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizeHandle.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const containerWidth = document.querySelector('.container').offsetWidth;
      const newWidth = Math.max(200, Math.min(e.clientX, containerWidth - 200));
      editorPane.style.width = newWidth + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });

    // Examples dropdown
    const EXAMPLES = {
      flowchart: `graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Process A]
    B -->|No| D[Process B]
    C --> E[End]
    D --> E`,
      sequence: `sequenceDiagram
    participant Alice
    participant Bob
    Alice->>John: Hello John
    John-->>Alice: Hi Alice
    Alice->>Bob: How are you?
    Bob-->>Alice: Great!`,
      class: `classDiagram
    Animal <|-- Duck
    Animal <|-- Fish
    Animal : +int age
    Animal : +String gender
    Animal: +isMammal()
    Duck : +String beakColor
    Duck : +swim()
    Fish : +int sizeInFeet
    Fish : +canEat()`,
      er: `erDiagram
    CUSTOMER ||--o{ ORDER : places
    ORDER ||--|{ LINE-ITEM : contains
    CUSTOMER }|..|{ DELIVERY-ADDRESS : uses
    CUSTOMER {
        string name
        string email
    }
    ORDER {
        int orderNumber
        string deliveryAddress
    }`,
      gantt: `gantt
    title Project Schedule
    dateFormat YYYY-MM-DD
    section Design
        Wireframes     :a1, 2024-01-01, 7d
        Mockups        :a2, after a1, 5d
    section Development
        Frontend       :b1, after a2, 14d
        Backend        :b2, after a2, 14d
    section Testing
        QA Testing     :c1, after b1, 7d`,
      pie: `pie title Favorite Pets
    "Dogs" : 45
    "Cats" : 30
    "Birds" : 15
    "Fish" : 10`,
      state: `stateDiagram-v2
    [*] --> Idle
    Idle --> Processing : Submit
    Processing --> Success : Done
    Processing --> Error : Fail
    Error --> Idle : Retry
    Success --> [*]`,
      journey: `journey
    title My Working Day
    section Go to work
        Make tea: 5: Me
        Go upstairs: 3: Me
        Do work: 1: Me, Cat
    section Go home
        Go downstairs: 5: Me
        Sit down: 5: Me`,
      mindmap: `mindmap
  root((Project))
    Design
      UI/UX
      Branding
    Development
      Frontend
      Backend
      Database
    Testing
      Unit Tests
      Integration`,
      gitgraph: `gitGraph
    commit
    commit
    branch develop
    checkout develop
    commit
    commit
    checkout main
    merge develop
    commit`,
      c4context: `C4Context
    title System Context Diagram
    Person(customer, "Customer", "A user of the system")
    System(webApp, "Web Application", "Delivers content")
    System_Ext(email, "Email System", "Sends emails")
    Rel(customer, webApp, "Uses")
    Rel(webApp, email, "Sends emails using")`,
      timeline: `timeline
    title Product Launch Timeline
    2024-Q1 : Research
            : User interviews
    2024-Q2 : Design
            : Prototyping
    2024-Q3 : Development
            : Alpha release
    2024-Q4 : Launch
            : Marketing push`,
      sankey: `sankey-beta
    Source A,Target X,30
    Source A,Target Y,20
    Source B,Target X,15
    Source B,Target Z,25
    Target X,Final,45
    Target Y,Final,20
    Target Z,Final,25`,
      xy: `xychart-beta
    title "Monthly Sales"
    x-axis [Jan, Feb, Mar, Apr, May, Jun]
    y-axis "Revenue (k)" 0 --> 100
    bar [30, 45, 60, 55, 70, 85]
    line [25, 40, 55, 50, 65, 80]`,
      block: `block-beta
    columns 3
    a["Frontend"] b["API Gateway"] c["Backend"]
    d["React App"]:1 e["REST API"]:1 f["Node.js"]:1
    g["CDN"]:1 h["Load Balancer"]:1 i["Database"]:1`,
      quadrant: `quadrant-beta
    title Feature Priority Matrix
    x-axis Low Effort --> High Effort
    y-axis Low Impact --> High Impact
    quadrant-1 Plan
    quadrant-2 Do First
    quadrant-3 Delegate
    quadrant-4 Eliminate
    Feature A: [0.3, 0.8]
    Feature B: [0.7, 0.9]
    Feature C: [0.2, 0.3]
    Feature D: [0.8, 0.2]
    Feature E: [0.5, 0.6]`,
      requirement: `requirementDiagram
    requirement user_auth {
        id: REQ-001
        text: Users must authenticate
        risk: high
        verifymethod: test
    }
    requirement session_mgmt {
        id: REQ-002
        text: Sessions expire after 30min
        risk: medium
        verifymethod: inspection
    }
    element web_app {
        type: application
    }
    web_app - satisfies -> user_auth
    web_app - satisfies -> session_mgmt`,
      kanban: `kanban
    Todo
        Design homepage
        Write API docs
    In Progress
        Build auth module
        Setup CI/CD
    Done
        Project setup
        Database schema`,
      packet: `packet-beta
    0-15: "Source Port"
    16-31: "Destination Port"
    32-63: "Sequence Number"
    64-95: "Acknowledgment Number"
    96-99: "Data Offset"
    100-105: "Reserved"
    106-111: "Flags"
    112-127: "Window Size"`,
      architecture: `architecture-beta
    group cloud(cloud)[Cloud]
    service api(server)[API] in cloud
    service db(database)[DB] in cloud
    service web(internet)[Web] in cloud

    web:R --> L:api
    api:R --> L:db`,
    };
    const examplesMenu = document.getElementById('examples-menu');
    document.getElementById('examples-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      examplesMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => examplesMenu.classList.remove('open'));
    examplesMenu.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        code.value = EXAMPLES[btn.dataset.type];
        code.dispatchEvent(new Event('input'));
        examplesMenu.classList.remove('open');
      });
    });

    // Fullscreen preview toggle
    const mainContainer = document.getElementById('main-container');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    fullscreenBtn.addEventListener('click', () => {
      mainContainer.classList.toggle('fullscreen');
      fullscreenBtn.textContent = mainContainer.classList.contains('fullscreen') ? 'Editor' : 'Fullscreen';
      requestAnimationFrame(fitToView);
    });

    // Drag-and-drop .mmd file import
    const dropOverlay = document.getElementById('drop-overlay');
    let dragCounter = 0;
    document.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      dropOverlay.classList.add('visible');
    });
    document.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('visible'); }
    });
    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.classList.remove('visible');
      const file = e.dataTransfer.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          code.value = ev.target.result;
          code.dispatchEvent(new Event('input'));
        };
        reader.readAsText(file);
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Ctrl+S — save PNG
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        exportAs('png');
      }
      // Ctrl+Shift+F — fit to view
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'F') {
        e.preventDefault();
        fitToView();
      }
      // Ctrl+= / Ctrl+- — zoom
      if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
        e.preventDefault();
        document.getElementById('zoom-in').click();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === '-') {
        e.preventDefault();
        document.getElementById('zoom-out').click();
      }
      // F11 — fullscreen
      if (e.key === 'F11') {
        e.preventDefault();
        fullscreenBtn.click();
      }
    });

    // LocalStorage persistence
    function saveState() {
      const state = {
        code: code.value,
        theme: currentMermaidTheme,
        bgColor: previewPane.style.background || '#ffffff',
        editorFontSize: editorFontSize.value,
        diagramFontSize: diagramFontSize.value,
        clrPrimary: clrPrimary.value,
        clrSecondary: clrSecondary.value,
        clrTertiary: clrTertiary.value,
        clrBackground: clrBackground.value,
        clrText: clrText.value,
        clrLine: clrLine.value,
      };
      try { localStorage.setItem('mermaid-viewer-state', JSON.stringify(state)); } catch(e) {}
    }
    function loadState() {
      try {
        const raw = localStorage.getItem('mermaid-viewer-state');
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s.code) code.value = s.code;
        if (s.bgColor) { previewPane.style.background = s.bgColor; bgColorInput.value = s.bgColor; }
        if (s.editorFontSize) { editorFontSize.value = s.editorFontSize; editorFontLabel.textContent = s.editorFontSize + 'px'; code.style.fontSize = s.editorFontSize + 'px'; document.querySelector('.line-numbers').style.fontSize = s.editorFontSize + 'px'; }
        if (s.diagramFontSize) { diagramFontSize.value = s.diagramFontSize; diagramFontLabel.textContent = s.diagramFontSize + 'px'; }
        if (s.clrPrimary) clrPrimary.value = s.clrPrimary;
        if (s.clrSecondary) clrSecondary.value = s.clrSecondary;
        if (s.clrTertiary) clrTertiary.value = s.clrTertiary;
        if (s.clrBackground) clrBackground.value = s.clrBackground;
        if (s.clrText) clrText.value = s.clrText;
        if (s.clrLine) clrLine.value = s.clrLine;
        if (s.theme) {
          currentMermaidTheme = s.theme;
          document.querySelectorAll('#theme-presets .preset-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === s.theme));
        }
      } catch(e) {}
    }
    // Auto-save on changes
    code.addEventListener('input', saveState);
    [bgColorInput, clrPrimary, clrSecondary, clrTertiary, clrBackground, clrText, clrLine, editorFontSize, diagramFontSize].forEach(el => el.addEventListener('change', saveState));
    bgPresets.forEach(b => b.addEventListener('click', () => setTimeout(saveState, 50)));
    document.querySelectorAll('#theme-presets .preset-btn').forEach(b => b.addEventListener('click', () => setTimeout(saveState, 50)));

    // Load saved state
    loadState();

    // Initial render
    updateLineNumbers();
    renderDiagram();
  </script>
</body>
</html>
